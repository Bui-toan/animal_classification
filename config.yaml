# Đường dẫn hệ thống
paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  model_save_dir: "models_saved"
  log_dir: "logs"

# Thông số xử lý ảnh
data:
  img_size: 224
  batch_size: 32
  # Tỉ lệ chia: Train 80%, Val 10%, Test 10%
  train_split: 0.8
  val_split: 0.1 

# Các lớp đối tượng
classes: ["cat", "chicken", "dog", "pig"]

# Thông số học sâu cơ bản
hyperparameters:
  learning_rate: 0.0001
  epochs: 50